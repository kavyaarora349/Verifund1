services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: verifund
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/verifund
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      RUN_QUEUE_WORKER: "true"
      SOCKET_CORS_ORIGINS: "*"
      JWT_SECRET: ${JWT_SECRET:-verifund_dev_jwt_secret_change_me_min16}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-verifund_dev_refresh_secret_change16}
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:

# Render Blueprint: API only (Docker). Create Redis separately (e.g. Upstash) and set REDIS_URL.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: verifund-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_QUEUE_WORKER
        value: "true"
      - key: SOCKET_CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
